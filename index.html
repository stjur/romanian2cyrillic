<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Transliterator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            margin-bottom: 20px;
        }
        textarea {
            width: 300px;
            height: 150px;
            margin-bottom: 20px;
        }
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        .key {
            width: 40px;
            height: 40px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background-color: white;
            position: relative;
        }
        .key span {
            font-size: 14px;
        }
        .key .latin {
            font-size: 10px;
            position: absolute;
            bottom: 2px;
            right: 2px;
            color: grey;
        }
        .key.shift {
            width: 80px;
        }
        .key.blink {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Real-Time Transliterator</h1>
        <textarea id="inputText" placeholder="Type here..."></textarea>
        <div id="outputText"></div>
    </div>
    <div class="keyboard" id="keyboard"></div>
    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const keyboard = document.getElementById('keyboard');

        const transliterationRules = {
            'a': 'а', 'A': 'А',
            'b': 'б', 'B': 'Б',
            'c': 'ч', 'C': 'Ч',
            'd': 'д', 'D': 'Д',
            'e': 'є', 'E': 'Є',
            'f': 'ф', 'F': 'Ф',
            'g': 'г', 'G': 'Г',
            'h': 'х', 'H': 'Х',
            'i': 'и', 'I': 'И',
            'j': 'џ', 'J': 'Џ',
            'k': 'к', 'K': 'К',
            'l': 'ʌ', 'L': 'Ɔ',
            'm': 'м', 'M': 'М',
            'n': 'н', 'N': 'Н',
            'o': 'ѡ', 'O': 'Ѡ',
            'p': 'п', 'P': 'П',
            'r': 'р', 'R': 'Р',
            's': 'с', 'S': 'С',
            't': 'т', 'T': 'Т',
            'u': 'ꙋ', 'U': 'Ꙋ',
            'v': 'в', 'V': 'В',
            'x': 'ѯ', 'X': 'Ѯ',
            'y': 'ѵ', 'Y': 'Ѵ',
            'z': 'з', 'Z': 'З',
            'î': 'ꙟ', 'Î': 'Ꙟ',
            'â': 'ѫ', 'Â': 'Ѫ',
            'ă': 'ъ', 'Ă': 'Ъ',
            'ș': 'ш', 'Ș': 'Ш',
            'ț': 'ц', 'Ț': 'Ц'
        };

        const keys = Object.keys(transliterationRules).filter(char => char.toLowerCase() === char);

        let isShiftActive = false;

        function transliterate(text) {
            return text.split('').map(char => transliterationRules[char] || char).join('');
        }

        function createKey(char) {
            const button = document.createElement('div');
            button.classList.add('key');
            const latinChar = Object.keys(transliterationRules).find(key => transliterationRules[key] === char);
            button.innerHTML = `<span>${char}</span><span class="latin">${latinChar}</span>`;
            button.addEventListener('click', () => {
                inputText.value += latinChar;
                inputText.dispatchEvent(new Event('input'));
                isShiftActive = false;
                renderKeyboard();
                button.classList.add('blink');
                setTimeout(() => button.classList.remove('blink'), 100);
            });
            return button;
        }

        function renderKeyboard() {
            keyboard.innerHTML = '';
            keys.forEach(key => {
                const char = isShiftActive ? transliterationRules[key.toUpperCase()] : transliterationRules[key];
                keyboard.appendChild(createKey(char));
            });
            const shiftKey = document.createElement('div');
            shiftKey.classList.add('key', 'shift');
            shiftKey.innerText = 'Shift';
            shiftKey.addEventListener('click', () => {
                isShiftActive = !isShiftActive;
                renderKeyboard();
            });
            keyboard.appendChild(shiftKey);
        }

        inputText.addEventListener('input', () => {
            const transliteratedText = transliterate(inputText.value);
            outputText.textContent = transliteratedText;
        });

        renderKeyboard();
    </script>
</body>
</html>
