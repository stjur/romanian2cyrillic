<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transliteration Software</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        #textBox {
            width: 500px;
            height: 150px;
            font-size: 18px;
            padding: 10px;
            margin-bottom: 20px;
        }
        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }
        .key {
            padding: 15px;
            text-align: center;
            border: 1px solid #ccc;
            cursor: pointer;
            user-select: none;
            width: 40px;
            height: 40px;
        }
        .modifier {
            grid-column: span 2;
            background-color: #f0f0f0;
        }
        .active {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <textarea id="textBox"></textarea>
    <div class="keyboard">
        <div class="key">a</div>
        <div class="key">b</div>
        <div class="key">c</div>
        <div class="key">d</div>
        <div class="key">e</div>
        <div class="key">f</div>
        <div class="key">g</div>
        <div class="key">h</div>
        <div class="key">i</div>
        <div class="key">j</div>
        <div class="key">k</div>
        <div class="key">l</div>
        <div class="key">m</div>
        <div class="key">n</div>
        <div class="key">o</div>
        <div class="key">p</div>
        <div class="key">r</div>
        <div class="key">s</div>
        <div class="key">t</div>
        <div class="key">u</div>
        <div class="key">v</div>
        <div class="key">x</div>
        <div class="key">y</div>
        <div class="key">z</div>
        <div class="key">î</div>
        <div class="key">â</div>
        <div class="key">ă</div>
        <div class="key">ș</div>
        <div class="key">ț</div>
        <div class="key modifier">Shift</div>
        <div class="key modifier">Alt</div>
        <div class="key modifier">´</div>
    </div>

    <script>
        const translitMap = {
            'a': 'а', 'b': 'б', 'c': 'ч', 'd': 'д', 'e': 'є', 'f': 'ф', 'g': 'г', 'h': 'х', 'i': 'и',
            'j': 'џ', 'k': 'к', 'l': 'ʌ', 'm': 'м', 'n': 'н', 'o': 'ѡ', 'p': 'п', 'r': 'р', 's': 'с',
            't': 'т', 'u': 'ꙋ', 'v': 'в', 'x': 'ѯ', 'y': 'ѵ', 'z': 'з', 'î': 'ꙟ', 'â': 'ѫ', 'ă': 'ъ',
            'ș': 'ш', 'ț': 'ц'
        };

        const altMap = {'i': 'ї'};

        let isShift = false;
        let isAlt = false;
        let isAcute = false;

        const textBox = document.getElementById('textBox');
        const keys = document.querySelectorAll('.key');
        const modifiers = document.querySelectorAll('.modifier');

        keys.forEach(key => {
            key.addEventListener('click', () => {
                const char = key.textContent;

                if (char === 'Shift') {
                    isShift = !isShift;
                    key.classList.toggle('active');
                    updateKeys();
                } else if (char === 'Alt') {
                    isAlt = !isAlt;
                    key.classList.toggle('active');
                    updateKeys();
                } else if (char === '´') {
                    isAcute = !isAcute;
                    key.classList.toggle('active');
                } else {
                    let transliteratedChar = transliterate(char);
                    textBox.value += transliteratedChar;
                    resetModifiers();
                }
            });
        });

        textBox.addEventListener('keypress', (event) => {
            let char = event.key;
            if (event.shiftKey) char = char.toUpperCase();
            const transliteratedChar = transliterate(char);
            textBox.value += transliteratedChar;
            event.preventDefault();
            resetModifiers();
        });

        function updateKeys() {
            keys.forEach(key => {
                const char = key.textContent.toLowerCase();
                if (char in translitMap) {
                    if (isAlt && altMap[char]) {
                        key.textContent = altMap[char];
                    } else if (isShift) {
                        key.textContent = translitMap[char].toUpperCase();
                    } else {
                        key.textContent = translitMap[char];
                    }
                }
            });
        }

        function resetModifiers() {
            isShift = false;
            isAlt = false;
            isAcute = false;
            modifiers.forEach(mod => mod.classList.remove('active'));
            updateKeys();
        }

        function transliterate(char) {
            if (isAcute && 'aeiou'.includes(char)) {
                char += '\u0301';
                isAcute = false;
            }
            if (isAlt && altMap[char]) {
                char = altMap[char];
                isAlt = false;
            } else if (translitMap[char.toLowerCase()]) {
                char = translitMap[char.toLowerCase()];
            }
            if (isShift) {
                char = char.toUpperCase();
                isShift = false;
            }
            return char;
        }
    </script>
</body>
</html>
