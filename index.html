<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Transliterator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            margin-bottom: 20px;
        }
        textarea {
            width: 300px;
            height: 150px;
            margin-bottom: 20px;
        }
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        .key {
            width: 40px;
            height: 40px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background-color: white;
            position: relative;
        }
        .key span {
            font-size: 14px;
        }
        .key .latin {
            font-size: 10px;
            position: absolute;
            bottom: 2px;
            right: 2px;
            color: grey;
        }
        .key.shift, .key.alt {
            width: 80px;
        }
        .key.blink {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Real-Time Transliterator</h1>
        <textarea id="inputText" placeholder="Type here..."></textarea>
    </div>
    <div class="keyboard" id="keyboard"></div>
    <script>
        const inputText = document.getElementById('inputText');
        const keyboard = document.getElementById('keyboard');

        const transliterationRulesDefault = {
            'a': 'Р°', 'A': 'Рҗ',
            'b': 'Рұ', 'B': 'Р‘',
            'c': 'СҮ', 'C': 'Р§',
            'd': 'Рҙ', 'D': 'Р”',
            'e': 'С”', 'E': 'Р„',
            'f': 'С„', 'F': 'РӨ',
            'g': 'Рі', 'G': 'Р“',
            'h': 'С…', 'H': 'РҘ',
            'i': 'Рё', 'I': 'Рҳ',
            'j': 'Сҹ', 'J': 'РҸ',
            'k': 'Рә', 'K': 'Рҡ',
            'l': 'КҢ', 'L': 'КҢ',
            'm': 'Рј', 'M': 'Рң',
            'n': 'РҪ', 'N': 'Рқ',
            'o': 'СЎ', 'O': 'С ',
            'p': 'Рҝ', 'P': 'Рҹ',
            'r': 'СҖ', 'R': 'Р ',
            's': 'СҒ', 'S': 'РЎ',
            't': 'СӮ', 'T': 'Рў',
            'u': 'кҷӢ', 'U': 'кҷҠ',
            'v': 'РІ', 'V': 'Р’',
            'x': 'СҜ', 'X': 'С®',
            'y': 'Сө', 'Y': 'Сҙ',
            'z': 'Р·', 'Z': 'Р—',
            'Г®': 'кҷҹ', 'ГҺ': 'кҷһ',
            'Гў': 'С«', 'ГӮ': 'СӘ',
            'Дғ': 'СҠ', 'ДӮ': 'РӘ',
            'Иҷ': 'СҲ', 'Иҳ': 'РЁ',
            'Иӣ': 'СҶ', 'Иҡ': 'РҰ'
        };

        const transliterationRulesAlt = {
            ...transliterationRulesDefault,
            'i': 'С—', 'I': 'РҮ'
        };

        let currentRules = transliterationRulesDefault;

        const keys = Object.keys(currentRules).filter(char => char.toLowerCase() === char);

        let isShiftActive = false;
        let isAltActive = false;
        let isAltKeyDown = false;

        function transliterate(text) {
            return text.split('').map(char => currentRules[char] || char).join('');
        }

        function createKey(char) {
            const button = document.createElement('div');
            button.classList.add('key');
            const latinChar = Object.keys(currentRules).find(key => currentRules[key] === char);
            button.innerHTML = `<span>${char}</span><span class="latin">${latinChar}</span>`;
            button.addEventListener('click', () => {
                inputText.value += latinChar;
                inputText.dispatchEvent(new Event('input'));
                isShiftActive = false;
                isAltActive = false;
                currentRules = transliterationRulesDefault;
                renderKeyboard();
                blinkKey(button);
            });
            button.id = `key-${latinChar}`;
            return button;
        }

        function blinkKey(button) {
            button.classList.add('blink');
            setTimeout(() => button.classList.remove('blink'), 100);
        }

        function renderKeyboard() {
            keyboard.innerHTML = '';
            keys.forEach(key => {
                const char = isShiftActive ? currentRules[key.toUpperCase()] : currentRules[key];
                keyboard.appendChild(createKey(char));
            });
            const shiftKey = document.createElement('div');
            shiftKey.classList.add('key', 'shift');
            shiftKey.innerText = 'Shift';
            shiftKey.addEventListener('click', () => {
                isShiftActive = !isShiftActive;
                renderKeyboard();
                blinkKey(shiftKey);
            });
            shiftKey.id = 'key-Shift';
            keyboard.appendChild(shiftKey);

            const altKey = document.createElement('div');
            altKey.classList.add('key', 'alt');
            altKey.innerText = 'Alt';
            altKey.addEventListener('click', () => {
                isAltActive = !isAltActive;
                currentRules = isAltActive ? transliterationRulesAlt : transliterationRulesDefault;
                renderKeyboard();
                blinkKey(altKey);
            });
            altKey.id = 'key-Alt';
            keyboard.appendChild(altKey);
        }

        inputText.addEventListener('input', () => {
            const transliteratedText = transliterate(inputText.value);
            inputText.value = transliteratedText;
        });

        document.addEventListener('keydown', (event) => {
            if (event.code === 'AltLeft' || event.code === 'AltRight') {
                isAltKeyDown = true;
                blinkKey(document.getElementById('key-Alt'));
            }
            if (isAltKeyDown && (event.code === 'KeyI')) {
                inputText.value += event.shiftKey ? 'РҮ' : 'С—';
                inputText.dispatchEvent(new Event('input'));
                isAltKeyDown = false;
                event.preventDefault();
            } else if (event.code === 'ShiftLeft' || event.code === 'ShiftRight') {
                blinkKey(document.getElementById('key-Shift'));
            } else {
                const key = event.key.toLowerCase();
                if (currentRules[key] || currentRules[key.toUpperCase()]) {
                    blinkKey(document.getElementById(`key-${key}`));
                }
            }
        });

        document.addEventListener('keyup', (event) => {
            if (event.code === 'AltLeft' || event.code === 'AltRight') {
                isAltKeyDown = false;
            }
        });

        renderKeyboard();
    </script>
</body>
</html>
