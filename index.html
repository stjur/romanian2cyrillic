<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Transliterator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            margin-bottom: 20px;
        }
        textarea {
            width: 300px;
            height: 150px;
            margin-bottom: 20px;
        }
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        .key {
            width: 40px;
            height: 40px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background-color: white;
            position: relative;
        }
        .key span {
            font-size: 14px;
        }
        .key .latin {
            font-size: 10px;
            position: absolute;
            bottom: 2px;
            right: 2px;
            color: grey;
        }
        .key.shift, .key.alt, .key.accent {
            width: 80px;
        }
        .key.blink {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Real-Time Transliterator</h1>
        <textarea id="inputText" placeholder="Type here..." autofocus></textarea>
    </div>
    <div class="keyboard" id="keyboard"></div>
    <script>
        const inputText = document.getElementById('inputText');
        const keyboard = document.getElementById('keyboard');

        const transliterationRules = {
            'a': 'а', 'A': 'А',
            'b': 'б', 'B': 'Б',
            'c': 'ч', 'C': 'Ч',
            'd': 'д', 'D': 'Д',
            'e': 'є', 'E': 'Є',
            'f': 'ф', 'F': 'Ф',
            'g': 'г', 'G': 'Г',
            'h': 'х', 'H': 'Х',
            'i': 'и', 'I': 'И',
            'j': 'џ', 'J': 'Џ',
            'k': 'к', 'K': 'К',
            'l': 'ʌ', 'L': 'Ʌ',
            'm': 'м', 'M': 'М',
            'n': 'н', 'N': 'Н',
            'o': 'ѡ', 'O': 'Ѡ',
            'p': 'п', 'P': 'П',
            'r': 'р', 'R': 'Р',
            's': 'с', 'S': 'С',
            't': 'т', 'T': 'Т',
            'u': 'ꙋ', 'U': 'Ꙋ',
            'v': 'в', 'V': 'В',
            'x': 'ѯ', 'X': 'Ѯ',
            'y': 'ѵ', 'Y': 'Ѵ',
            'z': 'з', 'Z': 'З',
            'î': 'ꙟ', 'Î': 'Ꙟ',
            'â': 'ѫ', 'Â': 'Ѫ',
            'ă': 'ъ', 'Ă': 'Ъ',
            'ș': 'ш', 'Ș': 'Ш',
            'ț': 'ц', 'Ț': 'Ц'
        };

        const transliterationRulesAlt = {
            ...transliterationRules,
            'i': 'ї', 'I': 'Ї'
        };

        const transliterationRulesAccent = {
            'а': 'а́', 'А': 'А́',
            'е': 'є́', 'Є': 'Є́',
            'и': 'и́', 'И': 'И́',
            'ї': 'ї́', 'Ї': 'Ї́',
            'ѡ': 'ѡ́', 'Ѡ': 'Ѡ́',
            'ꙋ': 'ꙋ́', 'Ꙋ': 'Ꙋ́',
            'ъ': 'ъ́', 'Ъ': 'Ъ́',
            'ѫ': 'ѫ́', 'Ѫ': 'Ѫ́',
            'ꙟ': 'ꙟ́', 'Ꙟ': 'Ꙟ́'
        };

        let isShiftActive = false;
        let isAltActive = false;
        let isAccentActive = false;

        function transliterate(text) {
            return text.split('').map(char => {
                if (isAccentActive && transliterationRulesAccent[char]) {
                    return transliterationRulesAccent[char];
                }
                if (isAltActive) {
                    return transliterationRulesAlt[char] || char;
                }
                return transliterationRules[char] || char;
            }).join('');
        }

        function createKey(char) {
            const button = document.createElement('div');
            button.classList.add('key');
            let displayChar = isShiftActive ? transliterationRules[char.toUpperCase()] : transliterationRules[char];
            const latinChar = isShiftActive ? char.toUpperCase() : char;
            if (isAltActive) {
                displayChar = isShiftActive ? transliterationRulesAlt[char.toUpperCase()] : transliterationRulesAlt[char];
            }
            if (isAccentActive && transliterationRulesAccent[displayChar]) {
                displayChar = transliterationRulesAccent[displayChar];
            }
            button.innerHTML = `<span>${displayChar}</span><span class="latin">${latinChar}</span>`;
            button.addEventListener('click', () => {
                inputText.value += latinChar;
                inputText.dispatchEvent(new Event('input'));
                button.classList.add('blink');
                setTimeout(() => button.classList.remove('blink'), 100);
            });
            return button;
        }

        function renderKeyboard() {
            keyboard.innerHTML = '';
            Object.keys(transliterationRules).forEach(key => {
                if (key.toLowerCase() === key) {
                    keyboard.appendChild(createKey(key));
                }
            });

            const shiftKey = document.createElement('div');
            shiftKey.classList.add('key', 'shift');
            shiftKey.innerText = 'Shift';
            shiftKey.addEventListener('click', () => {
                isShiftActive = !isShiftActive;
                renderKeyboard();
                shiftKey.classList.add('blink');
                setTimeout(() => shiftKey.classList.remove('blink'), 100);
            });
            keyboard.appendChild(shiftKey);

            const altKey = document.createElement('div');
            altKey.classList.add('key', 'alt');
            altKey.innerText = 'Alt';
            altKey.addEventListener('click', () => {
                isAltActive = !isAltActive;
                renderKeyboard();
                altKey.classList.add('blink');
                setTimeout(() => altKey.classList.remove('blink'), 100);
            });
            keyboard.appendChild(altKey);

            const accentKey = document.createElement('div');
            accentKey.classList.add('key', 'accent');
            accentKey.innerText = '´';
            accentKey.addEventListener('click', () => {
                isAccentActive = !isAccentActive;
                renderKeyboard();
                accentKey.classList.add('blink');
                setTimeout(() => accentKey.classList.remove('blink'), 100);
            });
            keyboard.appendChild(accentKey);
        }

        inputText.addEventListener('input', () => {
            const transliteratedText = transliterate(inputText.value);
            inputText.value = transliteratedText;
        });

        renderKeyboard();

        // Focus on the text box when the page loads
        window.addEventListener('load', () => {
            inputText.focus();
        });
    </script>
</body>
</html>
