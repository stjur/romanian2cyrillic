<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Transliterator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
        }
        textarea {
            width: 300px;
            height: 150px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Real-Time Transliterator</h1>
        <textarea id="inputText" placeholder="Type here..."></textarea>
        <div id="outputText"></div>
    </div>
    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');

        inputText.addEventListener('input', () => {
            const transliteratedText = transliterate(inputText.value);
            outputText.textContent = transliteratedText;
        });

        function transliterate(text) {
            const rules = {
                'a': 'а', 'A': 'А',
                'b': 'б', 'B': 'Б',
                'c': 'ч', 'C': 'Ч',
                'd': 'д', 'D': 'Д',
                'e': 'є', 'E': 'Є',
                'f': 'ф', 'F': 'Ф',
                'g': 'г', 'G': 'Г',
                'h': 'х', 'H': 'Х',
                'i': 'и', 'I': 'И',
                'j': 'џ', 'J': 'Џ',
                'k': 'к', 'K': 'К',
                'l': 'ʌ', 'L': 'Ɔ',
                'm': 'м', 'M': 'М',
                'n': 'н', 'N': 'Н',
                'o': 'ѡ', 'O': 'Ѡ',
                'p': 'п', 'P': 'П',
                'r': 'р', 'R': 'Р',
                's': 'с', 'S': 'С',
                't': 'т', 'T': 'Т',
                'u': 'ꙋ', 'U': 'Ꙋ',
                'v': 'в', 'V': 'В',
                'x': 'ѯ', 'X': 'Ѯ',
                'y': 'ѵ', 'Y': 'Ѵ',
                'z': 'з', 'Z': 'З',
                'î': 'ꙟ', 'Î': 'Ꙟ',
                'â': 'ѫ', 'Â': 'Ѫ',
                'ă': 'ъ', 'Ă': 'Ъ',
                'ș': 'ш', 'Ș': 'Ш',
                'ț': 'ц', 'Ț': 'Ц'
            // Add more rules as needed
            };
        return text.split('').map(char => rules[char] || char).join('');
        }
    </script>
</body>
</html>
