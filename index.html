<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Transliterator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            margin-bottom: 20px;
        }
        textarea {
            width: 300px;
            height: 150px;
            margin-bottom: 20px;
        }
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        .key {
            width: 40px;
            height: 40px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background-color: white;
            position: relative;
        }
        .key span {
            font-size: 14px;
        }
        .key .latin {
            font-size: 10px;
            position: absolute;
            bottom: 2px;
            right: 2px;
            color: grey;
        }
        .key.shift, .key.alt, .key.accent {
            width: 80px;
        }
        .key.blink {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Real-Time Transliterator</h1>
        <textarea id="inputText" placeholder="Type here..." autofocus></textarea>
    </div>
    <div class="keyboard" id="keyboard"></div>
    <script>
        const inputText = document.getElementById('inputText');
        const keyboard = document.getElementById('keyboard');

        const transliterationRulesDefault = {
            'a': 'а', 'A': 'А',
            'b': 'б', 'B': 'Б',
            'c': 'ч', 'C': 'Ч',
            'd': 'д', 'D': 'Д',
            'e': 'є', 'E': 'Є',
            'f': 'ф', 'F': 'Ф',
            'g': 'г', 'G': 'Г',
            'h': 'х', 'H': 'Х',
            'i': 'и', 'I': 'И',
            'j': 'џ', 'J': 'Џ',
            'k': 'к', 'K': 'К',
            'l': 'ʌ', 'L': 'Ʌ',
            'm': 'м', 'M': 'М',
            'n': 'н', 'N': 'Н',
            'o': 'ѡ', 'O': 'Ѡ',
            'p': 'п', 'P': 'П',
            'r': 'р', 'R': 'Р',
            's': 'с', 'S': 'С',
            't': 'т', 'T': 'Т',
            'u': 'ꙋ', 'U': 'Ꙋ',
            'v': 'в', 'V': 'В',
            'x': 'ѯ', 'X': 'Ѯ',
            'y': 'ѵ', 'Y': 'Ѵ',
            'z': 'з', 'Z': 'З',
            'î': 'ꙟ', 'Î': 'Ꙟ',
            'â': 'ѫ', 'Â': 'Ѫ',
            'ă': 'ъ', 'Ă': 'Ъ',
            'ș': 'ш', 'Ș': 'Ш',
            'ț': 'ц', 'Ț': 'Ц'
        };

        const transliterationRulesAlt = {
            ...transliterationRulesDefault,
            'i': 'ї', 'I': 'Ї'
        };

        const vowels = new Set(['а', 'е', 'и', 'ї', 'о', 'у', 'ѡ', 'ꙋ', 'ъ', 'ѫ', 'ꙟ']);
        const combiningAcuteAccent = '\u0301';

        let currentRules = transliterationRulesDefault;

        const keys = Object.keys(transliterationRulesDefault).filter(char => char.toLowerCase() === char);

        let isShiftActive = false;
        let isAltActive = false;
        let isAccentActive = false;
        let isAltKeyDown = false;

        function transliterate(text) {
            return text.split('').map(char => {
                if (isAccentActive && vowels.has(currentRules[char])) {
                    return currentRules[char] + combiningAcuteAccent;
                }
                return currentRules[char] || char;
            }).join('');
        }

        function createKey(char) {
            const button = document.createElement('div');
            button.classList.add('key');
            const latinChar = Object.keys(transliterationRulesDefault).find(key => transliterationRulesDefault[key] === char);
            button.innerHTML = `<span>${char}</span><span class="latin">${latinChar}</span>`;
            button.addEventListener('click', () => {
                inputText.value += latinChar;
                inputText.dispatchEvent(new Event('input'));
                isShiftActive = false;
                isAltActive = false;
                isAccentActive = false;
                currentRules = transliterationRulesDefault;
                renderKeyboard();
                blinkKey(button);
            });
            button.id = `key-${latinChar}`;
            return button;
        }

        function blinkKey(button) {
            button.classList.add('blink');
            setTimeout(() => button.classList.remove('blink'), 100);
        }

        function renderKeyboard() {
            keyboard.innerHTML = '';
            keys.forEach(key => {
                const char = isShiftActive ? currentRules[key.toUpperCase()] : currentRules[key];
                keyboard.appendChild(createKey(char));
            });
            const shiftKey = document.createElement('div');
            shiftKey.classList.add('key', 'shift');
            shiftKey.innerText = 'Shift';
            shiftKey.addEventListener('click', () => {
                isShiftActive = !isShiftActive;
                renderKeyboard();
                blinkKey(shiftKey);
            });
            shiftKey.id = 'key-Shift';
            keyboard.appendChild(shiftKey);

            const altKey = document.createElement('div');
            altKey.classList.add('key', 'alt');
            altKey.innerText = 'Alt';
            altKey.addEventListener('click', () => {
                isAltActive = !isAltActive;
                currentRules = isAltActive ? transliterationRulesAlt : transliterationRulesDefault;
                renderKeyboard();
                blinkKey(altKey);
            });
            altKey.id = 'key-Alt';
            keyboard.appendChild(altKey);

            const accentKey = document.createElement('div');
            accentKey.classList.add('key', 'accent');
            accentKey.innerText = '´';
            accentKey.addEventListener('click', () => {
                isAccentActive = !isAccentActive;
                renderKeyboard();
                blinkKey(accentKey);
            });
            accentKey.id = 'key-Accent';
            keyboard.appendChild(accentKey);
        }

        inputText.addEventListener('input', () => {
            const transliteratedText = transliterate(inputText.value);
            inputText.value = transliteratedText;
        });

        document.addEventListener('keydown', (event) => {
            if (event.code === 'AltLeft' || event.code === 'AltRight') {
                isAltKeyDown = true;
                blinkKey(document.getElementById('key-Alt'));
            }
            if (isAltKeyDown && (event.code === 'KeyI')) {
                inputText.value += event.shiftKey ? 'Ї' : 'ї';
                inputText.dispatchEvent(new Event('input'));
                blinkKey(document.getElementById('key-i'));
                isAltKeyDown = false;
                event.preventDefault();
            } else if (event.code === 'ShiftLeft' || event.code === 'ShiftRight') {
                blinkKey(document.getElementById('key-Shift'));
            } else {
                const key = event.key.toLowerCase();
                if (currentRules[key] || currentRules[key.toUpperCase()]) {
                    blinkKey(document.getElementById(`key-${key}`));
                }
            }
        });

        document.addEventListener('keyup', (event) => {
            if (event.code === 'AltLeft' || event.code === 'AltRight') {
                isAltKeyDown = false;
            }
        });

        renderKeyboard();

        // Focus on the text box when the page loads
        window.addEventListener('load', () => {
            inputText.focus();
        });
    </script>
</body>
</html>
